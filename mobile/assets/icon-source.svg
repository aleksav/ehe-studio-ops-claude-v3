<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#B0156A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E6FE9"/>
      <stop offset="100%" stop-color="#1E9FE9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Subtle grid pattern for "ops" feel -->
  <line x1="200" y1="180" x2="824" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="200" y1="280" x2="824" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="200" y1="750" x2="824" y2="750" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="200" y1="850" x2="824" y2="850" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- EHE text - bold, prominent -->
  <text x="512" y="510" text-anchor="middle" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="340" font-weight="900" fill="#FFFFFF" letter-spacing="-8">EHE</text>
  <!-- OPS text - lighter weight, blue accent, spaced out -->
  <text x="512" y="720" text-anchor="middle" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="180" font-weight="300" fill="url(#accent)" letter-spacing="40">OPS</text>
  <!-- Decorative bar under OPS -->
  <rect x="340" y="760" width="344" height="6" rx="3" fill="url(#accent)" opacity="0.7"/>
</svg>
