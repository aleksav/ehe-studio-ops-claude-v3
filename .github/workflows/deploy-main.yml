name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}

  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        if: ${{ secrets.VERCEL_TOKEN != '' }}

  deploy-mobile-ota:
    name: Mobile OTA Update (EAS)
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Decode App Store Connect API key
        run: |
          echo "$ASC_API_KEY_BASE64" | base64 --decode > /tmp/asc-api-key.p8
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        if: ${{ secrets.ASC_API_KEY_BASE64 != '' }}
      - name: Decode Google Play service account key
        run: |
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64" | base64 --decode > /tmp/google-play-key.json
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64 }}
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64 != '' }}
      - name: Push OTA update
        run: |
          cd mobile && eas update --branch production --message "deploy: ${{ github.sha }}"
        if: ${{ secrets.EXPO_TOKEN != '' }}
